# Render Blueprint — serves the PRE-BUILT static directory in ./public.
# No crawl/compile at deploy (that was fragile). The data-refresh loop runs
# `npm run refresh` (locally or via n8n) and commits ./public → Render auto-deploys.
# Flip the published brands via the generator's --mode flag at refresh time:
#   npm run crawl seeds/eaa-ecommerce.json && node bin/build-site.js --mode named
services:
  - type: web
    name: cirv-cookie-index
    runtime: static
    buildCommand: "echo 'serving prebuilt ./public'"
    staticPublishPath: ./public
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

  # API service — powers the pricing page's "Get a free key" + the public data
  # endpoints. Crawls a fresh dataset at build, then serves it. Free tier sleeps
  # after 15min idle; the pricing page pre-warms it with a /healthz ping on load.
  # Paid Subscribe (Stripe) returns 503 until STRIPE_SECRET_KEY + price IDs are set.
  - type: web
    name: cirv-cookie-api
    runtime: node
    plan: free
    buildCommand: "npm ci && npm run crawl seeds/eaa-ecommerce.json"
    startCommand: "npm run api"
    healthCheckPath: /healthz
    pullRequestPreviewsEnabled: false
    envVars:
      - key: DATA_DB
        value: ./data/index.db
      - key: CORS_ORIGINS
        value: "https://cookies.cirvgreen.com,https://cirv-cookie-index.onrender.com"
      - key: PORT
        value: "4000"
